<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ActionTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0B0F1C;font-family:'DM Sans',sans-serif;color:#e2e8f0;min-height:100vh;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
  .item-row:hover{background:rgba(255,255,255,.04)!important}
  .meeting-tab:hover{background:rgba(255,255,255,.05)!important}
  .action-btn:hover{opacity:.7}
  .cycle-btn:hover{background:rgba(255,255,255,.12)!important}
  .tab-wrap:hover .tab-del{opacity:1!important}
  select,input{color-scheme:dark}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:#161B2E;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
  .field-label{display:block;font-size:11px;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace}
  .field-input{width:100%;background:#0f1422;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
  .field-select{width:100%;background:#0f1422;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:14px;font-family:'DM Mono',monospace;outline:none}
  .btn-primary{width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif;font-size:14px}
  .color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .15s}
  .color-dot.selected{border-color:#fff}
  #no-meetings{text-align:center;padding:80px 0;color:#334155}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header" style="padding:28px 32px 0;border-bottom:1px solid rgba(255,255,255,.06)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:16px">
      <div>
        <h1 style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;color:#f8fafc">Action<span style="color:#6EE7B7">Tracker</span></h1>
        <p style="font-size:13px;color:#475569;margin-top:3px">Meeting action items, all in one place</p>
      </div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div style="display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 16px">
          <div id="overall-ring"></div>
          <div>
            <div style="font-size:11px;color:#475569;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em">Overall</div>
            <div id="overall-label" style="font-size:13px;font-weight:600;color:#cbd5e1;margin-top:2px">0/0 done</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="text-align:center;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px">
            <div id="stat-todo" style="font-size:18px;font-weight:700;color:#94a3b8;font-family:'Syne',sans-serif">0</div>
            <div style="font-size:10px;color:#475569;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em">To Do</div>
          </div>
          <div style="text-align:center;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px">
            <div id="stat-inprogress" style="font-size:18px;font-weight:700;color:#F59E0B;font-family:'Syne',sans-serif">0</div>
            <div style="font-size:10px;color:#475569;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em">In Progress</div>
          </div>
          <div style="text-align:center;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px">
            <div id="stat-done" style="font-size:18px;font-weight:700;color:#6EE7B7;font-family:'Syne',sans-serif">0</div>
            <div style="font-size:10px;color:#475569;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em">Done</div>
          </div>
        </div>
      </div>
    </div>
    <div id="meeting-tabs" style="display:flex;gap:4px;overflow-x:auto;padding-bottom:1px"></div>
  </div>

  <!-- Main -->
  <div id="main" style="padding:28px 32px"></div>
</div>

<!-- Modals -->
<div id="modal-container"></div>

<script>
const PEOPLE = ["Sarah K.","Tom R.","Maya L.","Priya N.","Dev C.","Unassigned"];
const STATUSES = ["todo","in-progress","done"];
const PRIORITIES = ["low","medium","high"];
const COLORS = ["#6EE7B7","#A5B4FC","#FDE68A","#F9A8D4","#7DD3FC","#FB923C"];

const statusConfig = {
  "todo":       {label:"To Do",      color:"#94a3b8", bg:"rgba(148,163,184,.12)"},
  "in-progress":{label:"In Progress",color:"#F59E0B", bg:"rgba(245,158,11,.12)"},
  "done":       {label:"Done",       color:"#6EE7B7", bg:"rgba(110,231,183,.12)"},
};
const priorityConfig = {
  low:   {label:"Low", color:"#94a3b8"},
  medium:{label:"Med", color:"#F59E0B"},
  high:  {label:"High",color:"#F87171"},
};

let state = {
  activeMeeting: "m1",
  filterStatus: "all",
  meetings: [
    {id:"m1",title:"Q2 Planning Session",date:"2026-04-14",color:"#6EE7B7",items:[
      {id:"i1",title:"Finalize roadmap doc",assignee:"Sarah K.",status:"done",priority:"high"},
      {id:"i2",title:"Schedule stakeholder reviews",assignee:"Tom R.",status:"in-progress",priority:"high"},
      {id:"i3",title:"Budget approval from finance",assignee:"Maya L.",status:"todo",priority:"medium"},
      {id:"i4",title:"Update team OKRs",assignee:"Tom R.",status:"in-progress",priority:"low"},
    ]},
    {id:"m2",title:"Design Review",date:"2026-04-17",color:"#A5B4FC",items:[
      {id:"i5",title:"Revise onboarding flow mockups",assignee:"Priya N.",status:"done",priority:"high"},
      {id:"i6",title:"Component library audit",assignee:"Sarah K.",status:"todo",priority:"medium"},
      {id:"i7",title:"Accessibility check on v2",assignee:"Unassigned",status:"todo",priority:"high"},
    ]},
    {id:"m3",title:"Engineering Sync",date:"2026-04-18",color:"#FDE68A",items:[
      {id:"i8",title:"Fix auth regression bug",assignee:"Dev C.",status:"done",priority:"high"},
      {id:"i9",title:"Write integration tests for API",assignee:"Dev C.",status:"in-progress",priority:"medium"},
      {id:"i10",title:"Deploy to staging",assignee:"Maya L.",status:"todo",priority:"medium"},
    ]},
  ]
};

function getProgress(items){
  if(!items.length) return 0;
  return Math.round(items.filter(i=>i.status==="done").length/items.length*100);
}

function progressRingSVG(pct, size, color){
  const r=(size-6)/2, circ=2*Math.PI*r, dash=(pct/100)*circ;
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="5"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dasharray .6s ease"/>
    </svg>
    <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#e2e8f0;font-family:'DM Mono',monospace">${pct}%</span>
  </div>`;
}

function badge(text, color, bg){
  return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;color:${color};background:${bg};border:1px solid ${color}33;letter-spacing:.02em;font-family:'DM Mono',monospace;white-space:nowrap">${text}</span>`;
}

function initials(name){ return name==="Unassigned"?"?":name.split(" ").map(w=>w[0]).join(""); }

function render(){
  renderHeader();
  renderTabs();
  renderMain();
}

function renderHeader(){
  const all = state.meetings.flatMap(m=>m.items);
  const done = all.filter(i=>i.status==="done").length;
  const inProgress = all.filter(i=>i.status==="in-progress").length;
  const todo = all.filter(i=>i.status==="todo").length;
  const pct = getProgress(all);

  document.getElementById("overall-ring").innerHTML = progressRingSVG(pct, 52, "#6EE7B7");
  document.getElementById("overall-label").textContent = `${done}/${all.length} done`;
  document.getElementById("stat-todo").textContent = todo;
  document.getElementById("stat-inprogress").textContent = inProgress;
  document.getElementById("stat-done").textContent = done;
}

function renderTabs(){
  const tabs = document.getElementById("meeting-tabs");
  tabs.innerHTML = state.meetings.map(m=>{
    const pct = getProgress(m.items);
    const active = m.id === state.activeMeeting;
    return `<div class="tab-wrap" style="display:flex;align-items:center;position:relative">
      <button class="meeting-tab" data-id="${m.id}" style="display:flex;align-items:center;gap:10px;padding:10px 28px 10px 16px;background:${active?"rgba(110,231,183,.08)":"transparent"};border:none;border-bottom:2px solid ${active?m.color:"transparent"};cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;margin-bottom:-1px">
        <span style="width:8px;height:8px;border-radius:50%;background:${m.color};flex-shrink:0;box-shadow:${active?`0 0 8px ${m.color}`:"none"}"></span>
        <span style="font-size:13px;font-weight:${active?600:400};color:${active?"#f1f5f9":"#64748b"};font-family:'DM Sans',sans-serif">${m.title}</span>
        <span style="font-size:10px;color:${m.color};font-family:'DM Mono',monospace;font-weight:700">${pct}%</span>
      </button>
      <button class="tab-del" data-id="${m.id}" title="Delete meeting" style="position:absolute;right:5px;top:50%;transform:translateY(-65%);background:rgba(248,113,113,.15);border:none;border-radius:4px;width:16px;height:16px;cursor:pointer;font-size:9px;color:#F87171;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1;padding:0">✕</button>
    </div>`;
  }).join("") +
  `<button id="add-meeting-btn" style="padding:10px 14px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#475569;font-size:20px;line-height:1;border-radius:8px 8px 0 0" title="Add meeting">＋</button>`;

  tabs.querySelectorAll(".meeting-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.activeMeeting=btn.dataset.id; state.filterStatus="all"; render(); });
  });
  tabs.querySelectorAll(".tab-del").forEach(btn=>{
    btn.addEventListener("click",(e)=>{ e.stopPropagation(); deleteMeeting(btn.dataset.id); });
  });
  document.getElementById("add-meeting-btn").addEventListener("click", openAddMeeting);
}

function renderMain(){
  const main = document.getElementById("main");
  const meeting = state.meetings.find(m=>m.id===state.activeMeeting);
  if(!meeting){ main.innerHTML=`<div id="no-meetings"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-family:'Syne',sans-serif;font-size:16px">No meetings yet — add one above</div></div>`; return; }

  const pct = getProgress(meeting.items);
  const visibleItems = state.filterStatus==="all" ? meeting.items : meeting.items.filter(i=>i.status===state.filterStatus);

  const statusBreakdown = STATUSES.map(s=>{
    const cnt = meeting.items.filter(i=>i.status===s).length;
    return badge(`${statusConfig[s].label}: ${cnt}`, statusConfig[s].color, statusConfig[s].bg);
  }).join("");

  const filterBtns = ["all",...STATUSES].map(s=>{
    const label = s==="all"?"All":s==="in-progress"?"Active":s.charAt(0).toUpperCase()+s.slice(1);
    const active = state.filterStatus===s;
    return `<button class="filter-btn" data-status="${s}" style="padding:5px 10px;border-radius:6px;border:none;cursor:pointer;background:${active?"rgba(255,255,255,.1)":"transparent"};color:${active?"#f1f5f9":"#64748b"};font-size:11px;font-weight:600;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em">${label}</button>`;
  }).join("");

  const itemsHTML = visibleItems.length===0
    ? `<div style="text-align:center;padding:60px 0;color:#334155"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-family:'Syne',sans-serif;font-size:16px">No items here yet</div></div>`
    : visibleItems.map(item=>{
        const sc = statusConfig[item.status];
        const pc = priorityConfig[item.priority];
        const av = item.assignee==="Unassigned";
        const cycleIcon = item.status==="done"?`<span style="color:${statusConfig.done.color}">✓</span>`:item.status==="in-progress"?`<span style="color:${statusConfig["in-progress"].color};font-size:10px">●</span>`:`<span></span>`;
        return `<div class="item-row" data-id="${item.id}" style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;transition:background .15s">
          <button class="cycle-btn" data-id="${item.id}" title="Click to advance status" style="width:28px;height:28px;border-radius:50%;border:2px solid ${sc.color};background:${item.status==="done"?sc.color+"33":"transparent"};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px">${cycleIcon}</button>
          <span style="flex:1;font-size:14px;color:${item.status==="done"?"#475569":"#e2e8f0"};text-decoration:${item.status==="done"?"line-through":"none"};font-weight:500">${item.title}</span>
          <span style="font-size:10px;font-family:'DM Mono',monospace;font-weight:700;color:${pc.color};width:30px;text-align:center">${pc.label.toUpperCase()}</span>
          ${badge(sc.label, sc.color, sc.bg)}
          <div style="display:flex;align-items:center;gap:6px;min-width:110px">
            <div style="width:26px;height:26px;border-radius:50%;flex-shrink:0;background:${av?"rgba(255,255,255,.07)":meeting.color+"33"};border:1.5px solid ${av?"rgba(255,255,255,.1)":meeting.color+"66"};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${meeting.color};font-family:'DM Mono',monospace">${initials(item.assignee)}</div>
            <span style="font-size:12px;color:#64748b;white-space:nowrap">${item.assignee}</span>
          </div>
          <div style="display:flex;gap:4px">
            <button class="action-btn edit-btn" data-id="${item.id}" style="background:rgba(255,255,255,.06);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px;color:#94a3b8">✎</button>
            <button class="action-btn del-item-btn" data-id="${item.id}" style="background:rgba(248,113,113,.08);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px;color:#F87171">✕</button>
          </div>
        </div>`;
      }).join("");

  main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:16px">
        ${progressRingSVG(pct, 64, meeting.color)}
        <div>
          <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#f8fafc">${meeting.title}</h2>
          <div style="font-size:12px;color:#475569;font-family:'DM Mono',monospace;margin-top:3px">${meeting.date||"No date"} · ${meeting.items.length} action items</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">${statusBreakdown}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div style="display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:8px;padding:3px">${filterBtns}</div>
        <button id="add-item-btn" style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:${meeting.color};border-radius:8px;border:none;cursor:pointer;color:#0B0F1C;font-weight:700;font-size:13px;font-family:'DM Sans',sans-serif">+ Add Item</button>
        <button id="del-meeting-btn" style="display:flex;align-items:center;gap:5px;padding:8px 12px;background:rgba(248,113,113,.08);border-radius:8px;border:1px solid rgba(248,113,113,.2);cursor:pointer;color:#F87171;font-weight:600;font-size:13px;font-family:'DM Sans',sans-serif">🗑 Delete</button>
      </div>
    </div>
    <div style="margin-bottom:24px;height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${meeting.color}88,${meeting.color});border-radius:4px;transition:width .5s ease"></div>
    </div>
    <div id="items-list">${itemsHTML}</div>`;

  document.querySelectorAll(".filter-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.filterStatus=btn.dataset.status; renderMain(); });
  });
  document.getElementById("add-item-btn").addEventListener("click", openAddItem);
  document.getElementById("del-meeting-btn").addEventListener("click", ()=>deleteMeeting(state.activeMeeting));
  document.querySelectorAll(".cycle-btn").forEach(btn=>{
    btn.addEventListener("click",()=>cycleStatus(btn.dataset.id));
  });
  document.querySelectorAll(".edit-btn").forEach(btn=>{
    btn.addEventListener("click",()=>openEditItem(btn.dataset.id));
  });
  document.querySelectorAll(".del-item-btn").forEach(btn=>{
    btn.addEventListener("click",()=>deleteItem(btn.dataset.id));
  });
}

/* ── Actions ── */
function cycleStatus(itemId){
  state.meetings = state.meetings.map(m=> m.id!==state.activeMeeting?m:{...m,items:m.items.map(i=>i.id!==itemId?i:{...i,status:STATUSES[(STATUSES.indexOf(i.status)+1)%3]})});
  render();
}
function deleteItem(itemId){
  state.meetings = state.meetings.map(m=> m.id!==state.activeMeeting?m:{...m,items:m.items.filter(i=>i.id!==itemId)});
  render();
}
function deleteMeeting(meetingId){
  const remaining = state.meetings.filter(m=>m.id!==meetingId);
  state.meetings = remaining;
  if(state.activeMeeting===meetingId) state.activeMeeting = remaining.length?remaining[0].id:null;
  render();
}

/* ── Modals ── */
function showModal(html){
  const c = document.getElementById("modal-container");
  c.innerHTML = `<div class="modal-backdrop" id="modal-backdrop">${html}</div>`;
  document.getElementById("modal-backdrop").addEventListener("click",(e)=>{ if(e.target.id==="modal-backdrop") closeModal(); });
}
function closeModal(){ document.getElementById("modal-container").innerHTML=""; }

function modalShell(title, body){
  return `<div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:17px;font-weight:700;color:#f1f5f9;font-family:'Syne',sans-serif">${title}</span>
      <button onclick="closeModal()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1">✕</button>
    </div>
    ${body}
  </div>`;
}

function fieldInput(label, id, value, placeholder){
  return `<div style="margin-bottom:14px"><label class="field-label">${label}</label><input class="field-input" id="${id}" value="${value||""}" placeholder="${placeholder||""}"/></div>`;
}
function fieldSelect(label, id, value, options){
  const opts = options.map(o=>{ const v=o.value??o; const l=o.label??o; return `<option value="${v}"${v===value?" selected":""}>${l}</option>`; }).join("");
  return `<div style="margin-bottom:14px"><label class="field-label">${label}</label><select class="field-select" id="${id}">${opts}</select></div>`;
}
function colorPicker(selected){
  return `<div style="margin-bottom:18px"><label class="field-label">Accent Color</label><div style="display:flex;gap:8px;margin-top:4px">${COLORS.map(c=>`<button class="color-dot${c===selected?" selected":""}" data-color="${c}" style="background:${c}" onclick="selectColor('${c}')"></button>`).join("")}</div></div>`;
}
function selectColor(c){
  document.querySelectorAll(".color-dot").forEach(d=>d.classList.toggle("selected",d.dataset.color===c));
}

function openAddMeeting(){
  showModal(modalShell("New Meeting",`
    ${fieldInput("Meeting Name","m-title","","e.g. Weekly Standup")}
    ${fieldInput("Date","m-date","","YYYY-MM-DD")}
    ${colorPicker("#6EE7B7")}
    <button class="btn-primary" style="background:#6EE7B7;color:#0B0F1C" onclick="saveAddMeeting()">Create Meeting</button>
  `));
}
function saveAddMeeting(){
  const title = document.getElementById("m-title").value.trim();
  if(!title) return;
  const date = document.getElementById("m-date").value;
  const color = document.querySelector(".color-dot.selected")?.dataset.color||"#6EE7B7";
  const newM = {id:`m${Date.now()}`,title,date,color,items:[]};
  state.meetings.push(newM);
  state.activeMeeting = newM.id;
  closeModal(); render();
}

function openAddItem(){
  const meeting = state.meetings.find(m=>m.id===state.activeMeeting);
  showModal(modalShell("New Action Item",`
    ${fieldInput("Task","i-title","","What needs to be done?")}
    ${fieldSelect("Assign To","i-assignee","Unassigned",PEOPLE)}
    ${fieldSelect("Priority","i-priority","medium",PRIORITIES.map(p=>({value:p,label:priorityConfig[p].label})))}
    ${fieldSelect("Status","i-status","todo",STATUSES.map(s=>({value:s,label:statusConfig[s].label})))}
    <button class="btn-primary" style="background:${meeting?.color||"#6EE7B7"};color:#0B0F1C" onclick="saveAddItem()">Add Item</button>
  `));
}
function saveAddItem(){
  const title = document.getElementById("i-title").value.trim();
  if(!title) return;
  const newItem = {
    id:`i${Date.now()}`,title,
    assignee:document.getElementById("i-assignee").value,
    priority:document.getElementById("i-priority").value,
    status:document.getElementById("i-status").value,
  };
  state.meetings = state.meetings.map(m=> m.id!==state.activeMeeting?m:{...m,items:[...m.items,newItem]});
  closeModal(); render();
}

function openEditItem(itemId){
  const meeting = state.meetings.find(m=>m.id===state.activeMeeting);
  const item = meeting?.items.find(i=>i.id===itemId);
  if(!item) return;
  showModal(modalShell("Edit Action Item",`
    ${fieldInput("Task","ei-title",item.title,"")}
    ${fieldSelect("Assign To","ei-assignee",item.assignee,PEOPLE)}
    ${fieldSelect("Priority","ei-priority",item.priority,PRIORITIES.map(p=>({value:p,label:priorityConfig[p].label})))}
    ${fieldSelect("Status","ei-status",item.status,STATUSES.map(s=>({value:s,label:statusConfig[s].label})))}
    <button class="btn-primary" style="background:${meeting?.color||"#6EE7B7"};color:#0B0F1C" onclick="saveEditItem('${itemId}')">Save Changes</button>
  `));
}
function saveEditItem(itemId){
  const title = document.getElementById("ei-title").value.trim();
  if(!title) return;
  state.meetings = state.meetings.map(m=> m.id!==state.activeMeeting?m:{...m,items:m.items.map(i=> i.id!==itemId?i:{...i,
    title, assignee:document.getElementById("ei-assignee").value,
    priority:document.getElementById("ei-priority").value,
    status:document.getElementById("ei-status").value,
  })});
  closeModal(); render();
}

render();
</script>
</body>
</html>
